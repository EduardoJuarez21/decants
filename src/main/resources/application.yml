spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/decants_db}
    username: ${DATABASE_USERNAME:decants_user}
    password: ${DATABASE_PASSWORD:decants_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  thymeleaf:
    cache: false
    encoding: UTF-8

admin:
  usuario: ${ADMIN_USUARIO:admin}
  password: ${ADMIN_PASSWORD:changeme123}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_PON_TU_KEY_AQUI}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

google:
  maps:
    api-key: ${GOOGLE_MAPS_KEY:}

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/}
