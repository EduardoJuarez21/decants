spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/decants_db}
    username: ${DATABASE_USERNAME:decants_user}
    password: ${DATABASE_PASSWORD:decants_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  thymeleaf:
    cache: false
    encoding: UTF-8

admin:
  usuario: ${ADMIN_USUARIO:admin}
  password: ${ADMIN_PASSWORD:changeme123}

stripe:
  secret-key-live: ${STRIPE_SECRET_KEY:}
  secret-key-test: ${STRIPE_SECRET_KEY_TEST:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

google:
  maps:
    api-key: ${GOOGLE_MAPS_KEY:}

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: native
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/}
    session:
      cookie:
        secure: true
        http-only: true
        same-site: strict
  tomcat:
    accesslog:
      enabled: true
      directory: /app/logs
      prefix: access
      suffix: .log
      pattern: "%{yyyy-MM-dd HH:mm:ss}t %h \"%r\" %s %b %Dms"
      rotate: true

logging:
  file:
    name: /app/logs/decants.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      file-name-pattern: /app/logs/decants.%d{yyyy-MM-dd}.%i.log.gz
  level:
    root: INFO
    mx.decants: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
