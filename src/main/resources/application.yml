spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/decants_db}
    username: ${DATABASE_USERNAME:decants_user}
    password: ${DATABASE_PASSWORD:decants_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  thymeleaf:
    cache: false
    encoding: UTF-8

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/}
