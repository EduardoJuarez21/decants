<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reseñas — Admin | Aura Decants MX</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .resena-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: start;
            padding: 1.25rem 1.75rem;
            border-bottom: 1px solid #f0ede8;
        }
        .resena-row:last-child { border-bottom: none; }
        .resena-nombre { font-size: 0.88rem; font-weight: 700; color: #1a1a1a; }
        .resena-fecha  { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
        .resena-texto  { font-size: 0.85rem; color: #444; margin-top: 0.4rem; line-height: 1.5; }
        .resena-estrellas { color: #c9a96e; font-size: 0.9rem; margin-top: 0.2rem; }
        .resena-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
        .badge-pendiente {
            display: inline-block; font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.7px;
            padding: 0.15rem 0.5rem; border-radius: 4px;
            background: #fff3cd; color: #7a5700; border: 1px solid #f0d070;
            margin-left: 0.5rem;
        }
        .badge-aprobada {
            display: inline-block; font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.7px;
            padding: 0.15rem 0.5rem; border-radius: 4px;
            background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7;
            margin-left: 0.5rem;
        }
        .btn-aprobar {
            padding: 0.3rem 0.8rem; font-size: 0.78rem; border-radius: 6px;
            background: #1a1a1a; color: #fff; border: none; cursor: pointer;
            font-family: inherit; font-weight: 600;
        }
        .btn-eliminar {
            padding: 0.3rem 0.8rem; font-size: 0.78rem; border-radius: 6px;
            background: #fff; color: #c0392b; border: 1.5px solid #e8c0bc;
            cursor: pointer; font-family: inherit; font-weight: 600;
        }
        .resenas-empty { padding: 2rem 1.75rem; color: var(--muted); font-size: 0.88rem; }
    </style>
</head>
<body>

<div class="admin-page">

    <div class="admin-header" style="display:flex; align-items:center; justify-content:space-between;">
        <h1>Panel de administración</h1>
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <span class="admin-brand">Aura Decants</span>
            <form th:action="@{/aura-gestion/logout}" method="post" style="margin:0;">
                <button type="submit" style="background:none; border:none; color:rgba(255,255,255,0.6); font-size:0.8rem; cursor:pointer; font-family:inherit;">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>

    <div style="display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap;">
        <a th:href="@{/aura-gestion/dashboard}"    class="admin-link">Dashboard</a>
        <span style="color:#ccc;">|</span>
        <a th:href="@{/aura-gestion/pedidos}"      class="admin-link">Pedidos</a>
        <span style="color:#ccc;">|</span>
        <a th:href="@{/aura-gestion/clientes}"     class="admin-link">Clientes</a>
        <span style="color:#ccc;">|</span>
        <a th:href="@{/aura-gestion/productos}"    class="admin-link">Catálogo</a>
        <span style="color:#ccc;">|</span>
        <a th:href="@{/aura-gestion/cupones}"      class="admin-link">Cupones</a>
        <span style="color:#ccc;">|</span>
        <a th:href="@{/aura-gestion/resenas}"      class="admin-link" style="font-weight:700;">Reseñas</a>
        <span style="color:#ccc;">|</span>
        <a th:href="@{/aura-gestion/visitas}"      class="admin-link">Visitas</a>
        <span style="color:#ccc;">|</span>
        <a th:href="@{/aura-gestion/configuracion}" class="admin-link">Configuración</a>
    </div>

    <div th:if="${mensaje}"
         style="background:#d4edda; color:#155724; border:1px solid #c3e6cb; border-radius:8px;
                padding:0.75rem 1.25rem; margin-bottom:1.25rem; font-size:0.88rem;"
         th:text="${mensaje}"></div>

    <div class="admin-card">
        <div class="admin-card-header">
            <h2>Reseñas de clientes</h2>
            <span style="font-size:0.78rem; color:var(--muted);"
                  th:text="${resenas.size()} + ' en total'"></span>
        </div>

        <div th:if="${resenas.isEmpty()}" class="resenas-empty">
            No hay reseñas todavía.
        </div>

        <div th:each="r : ${resenas}" class="resena-row">
            <div>
                <div>
                    <span class="resena-nombre" th:text="${r.nombre}"></span>
                    <span th:if="${!r.aprobada}" class="badge-pendiente">Pendiente</span>
                    <span th:if="${r.aprobada}"  class="badge-aprobada">Publicada</span>
                </div>
                <div class="resena-estrellas">
                    <span th:each="i : ${#numbers.sequence(1, r.calificacion)}">★</span><span th:if="${r.calificacion < 5}" th:each="i : ${#numbers.sequence(r.calificacion + 1, 5)}" style="color:#ddd;">★</span>
                </div>
                <div class="resena-fecha"
                     th:text="${#temporals.format(r.fecha, 'dd/MM/yyyy HH:mm')}"></div>
                <div class="resena-texto" th:text="${r.texto}"></div>
            </div>
            <div class="resena-actions">
                <form th:if="${!r.aprobada}"
                      th:action="@{/aura-gestion/resenas/{id}/aprobar(id=${r.id})}"
                      method="post" style="margin:0;">
                    <button type="submit" class="btn-aprobar">Aprobar</button>
                </form>
                <form th:action="@{/aura-gestion/resenas/{id}/eliminar(id=${r.id})}"
                      method="post" style="margin:0;"
                      onsubmit="return confirm('¿Eliminar esta reseña?')">
                    <button type="submit" class="btn-eliminar">Eliminar</button>
                </form>
            </div>
        </div>
    </div>

    <div style="margin-top:1.5rem;">
        <a th:href="@{/}" class="admin-link">&#8592; Ir a la página principal</a>
    </div>

</div>

</body>
</html>
