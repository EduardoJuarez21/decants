<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | Decants MX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        body { background: #0d0d0d; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 2.8rem 2.4rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        }
        .login-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-style: italic;
            color: #c9a96e;
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .login-sub { text-align: center; font-size: 0.82rem; color: #888; margin-bottom: 2rem; }
        .login-box label { display: block; font-size: 0.78rem; font-weight: 600; color: #444; margin-bottom: 0.4rem; letter-spacing: 0.4px; }
        .login-box input {
            width: 100%; box-sizing: border-box;
            padding: 0.72rem 1rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            margin-bottom: 1.2rem;
            transition: border-color 0.2s;
            outline: none;
        }
        .login-box input:focus { border-color: #c9a96e; }
        .login-btn {
            width: 100%; padding: 0.82rem;
            background: #1a1a1a; color: #fff;
            border: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: background 0.2s;
        }
        .login-btn:hover { background: #c9a96e; }
        .login-error {
            background: #fce4ec; color: #c62828;
            border-radius: 8px; padding: 0.65rem 1rem;
            font-size: 0.82rem; margin-bottom: 1.2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <p class="login-brand">Decants</p>
        <p class="login-sub">Acceso al panel de administración</p>

        <div th:if="${param.error}" class="login-error">
            Usuario o contraseña incorrectos.
        </div>

        <form th:action="@{/admin/login}" method="post">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>

            <button type="submit" class="login-btn">Entrar</button>
        </form>
    </div>
</body>
</html>
