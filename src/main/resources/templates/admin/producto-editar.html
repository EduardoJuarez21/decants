<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar producto — Admin | Aura Decants MX</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div class="admin-page">

    <div class="admin-header" style="display:flex; align-items:center; justify-content:space-between;">
        <h1>Panel de administración</h1>
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <span class="admin-brand">Aura Decants</span>
            <form th:action="@{/aura-gestion/logout}" method="post" style="margin:0;">
                <button type="submit" style="background:none; border:none; color:rgba(255,255,255,0.6); font-size:0.8rem; cursor:pointer; font-family:inherit;">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>

    <div style="margin-bottom:1.5rem;">
        <a th:href="@{/aura-gestion/productos}" class="admin-link">&#8592; Volver al catálogo</a>
    </div>

    <div class="admin-card" style="max-width:540px;">
        <div class="admin-card-header">
            <h2>Editar producto</h2>
            <span style="font-size:0.8rem; color:var(--muted);" th:text="'#' + ${producto.id}"></span>
        </div>

        <form th:action="@{/aura-gestion/productos/{id}/editar(id=${producto.id})}" method="post"
              style="padding:1.5rem 1.75rem; display:flex; flex-direction:column; gap:1.1rem;">

            <!-- Nombre -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Nombre</label>
                <input type="text" name="nombre" th:value="${producto.nombre}" required
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Marca -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Marca</label>
                <input type="text" name="marca" th:value="${producto.marca}" required
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Características -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Características <span style="font-weight:400; color:var(--muted);">(opcional, cómo se percibe: dulce, fresco, juvenil…)</span>
                </label>
                <input type="text" name="caracteristicas" th:value="${producto.caracteristicas}" placeholder="ej. Dulce · Juvenil · Fresco"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Inspiración / comparación -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Inspiración <span style="font-weight:400; color:var(--muted);">(opcional, solo certeza alta — ej. "Recuerda a: Creed Aventus")</span>
                </label>
                <input type="text" name="inspiracion" th:value="${producto.inspiracion}" placeholder="ej. ADN similar a: Creed Aventus"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Precios -->
            <div style="display:flex; gap:1rem;">
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                        Precio 10 ml ($)
                    </label>
                    <input type="number" name="precio" th:value="${producto.precio}" min="1" required
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                        Precio 5 ml ($) <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                    </label>
                    <input type="number" name="precio5ml" th:value="${producto.precio5ml}" min="1"
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                        Precio 3 ml ($) <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                    </label>
                    <input type="number" name="precio3ml" th:value="${producto.precio3ml}" min="1"
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
            </div>

            <!-- Stock -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Stock disponible <span style="font-weight:400; color:var(--muted);">(vacío = ilimitado, 0 = agotado)</span>
                </label>
                <input type="number" name="stock" th:value="${producto.stock}" min="0" placeholder="∞"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Best Seller -->
            <label style="display:flex; align-items:center; gap:0.6rem; cursor:pointer; font-size:0.88rem; color:#444;">
                <input type="checkbox" name="bestSeller" value="true" th:checked="${producto.bestSeller}"
                       style="width:16px; height:16px; cursor:pointer; accent-color:#1a1a1a;">
                Marcar como Best Seller ★
            </label>

            <!-- Botones -->
            <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
                <button type="submit"
                        style="flex:1; padding:0.7rem 1.5rem; background:#1a1a1a; color:#fff; border:none;
                               border-radius:8px; font-size:0.88rem; font-family:inherit; cursor:pointer; font-weight:600;">
                    Guardar cambios
                </button>
                <a th:href="@{/aura-gestion/productos}"
                   style="flex:1; padding:0.7rem 1.5rem; background:#f5f5f5; color:#444; border:none;
                          border-radius:8px; font-size:0.88rem; font-family:inherit; cursor:pointer; font-weight:600;
                          text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center;">
                    Cancelar
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
