<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar venta — Admin | Aura Decants MX</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div class="admin-page">

    <div class="admin-header" style="display:flex; align-items:center; justify-content:space-between;">
        <h1>Panel de administración</h1>
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <span class="admin-brand">Decants</span>
            <form th:action="@{/aura-gestion/logout}" method="post" style="margin:0;">
                <button type="submit" style="background:none; border:none; color:rgba(255,255,255,0.6); font-size:0.8rem; cursor:pointer; font-family:inherit;">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>

    <div style="margin-bottom:1.5rem;">
        <a th:href="@{/aura-gestion/pedidos}" class="admin-link">&#8592; Volver a pedidos</a>
    </div>

    <div class="admin-card" style="max-width:580px;">
        <div class="admin-card-header">
            <h2>Registrar venta directa</h2>
            <span style="background:#e8e0f8; color:#4a2d8a; font-size:0.72rem; font-weight:700;
                         padding:0.2rem 0.6rem; border-radius:4px;">MANUAL</span>
        </div>

        <form th:action="@{/aura-gestion/pedidos/nuevo}" method="post"
              style="padding:1.5rem 1.75rem; display:flex; flex-direction:column; gap:1.1rem;">

            <!-- Cliente -->
            <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px;
                      color:var(--muted); margin:0 0 -0.4rem 0;">Datos del cliente</p>

            <div style="display:flex; gap:1rem;">
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">Nombre *</label>
                    <input type="text" name="nombre" required placeholder="Ana García"
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.88rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">Teléfono * <span style="font-weight:400; color:var(--muted);">(10 dígitos)</span></label>
                    <input type="tel" name="telefono" required placeholder="5512345678" maxlength="10"
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.88rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">Email <span style="font-weight:400; color:var(--muted);">(opcional)</span></label>
                <input type="email" name="email" placeholder="ana@ejemplo.com"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.88rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <hr style="border:none; border-top:1px solid #ececec; margin:0;">

            <!-- Pedido -->
            <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px;
                      color:var(--muted); margin:0 0 -0.4rem 0;">Detalle del pedido</p>

            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">Productos vendidos *</label>
                <textarea name="productos" required rows="3"
                          placeholder="Bleu de Chanel 10ml, Sauvage 5ml x2…"
                          style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                 font-size:0.88rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;
                                 resize:vertical;"></textarea>
            </div>

            <div style="display:flex; gap:1rem;">
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">Total cobrado ($MXN) *</label>
                    <input type="number" name="total" required min="1" placeholder="350"
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.88rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">Estado</label>
                    <select name="estado"
                            style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                   font-size:0.88rem; font-family:inherit; outline:none; background:#fff;
                                   width:100%; box-sizing:border-box; cursor:pointer;">
                        <option value="CONFIRMADO">Confirmado (en preparación)</option>
                        <option value="ENTREGADO">Entregado</option>
                        <option value="EN_REVISION">En revisión</option>
                    </select>
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">Dirección de entrega <span style="font-weight:400; color:var(--muted);">(opcional)</span></label>
                <input type="text" name="direccion" placeholder="Calle, colonia, ciudad…"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.88rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">Notas / método de pago <span style="font-weight:400; color:var(--muted);">(opcional)</span></label>
                <textarea name="comentarios" rows="2"
                          placeholder="Pago por transferencia, venta por WhatsApp, cliente conocido…"
                          style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                 font-size:0.88rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;
                                 resize:vertical;"></textarea>
            </div>

            <!-- Botones -->
            <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
                <button type="submit"
                        style="flex:1; padding:0.75rem 1.5rem; background:#1a1a1a; color:#fff; border:none;
                               border-radius:8px; font-size:0.88rem; font-family:inherit; cursor:pointer; font-weight:600;">
                    Registrar pedido
                </button>
                <a th:href="@{/aura-gestion/pedidos}"
                   style="flex:1; padding:0.75rem 1.5rem; background:#f5f5f5; color:#444; border:none;
                          border-radius:8px; font-size:0.88rem; font-family:inherit; text-align:center;
                          text-decoration:none; display:flex; align-items:center; justify-content:center;
                          font-weight:600;">
                    Cancelar
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
