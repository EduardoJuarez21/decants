<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar venta — Admin | Aura Decants MX</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        #productoPicker { position: relative; }

        #productoDropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: #fff;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,.13);
            z-index: 200;
            max-height: 300px;
            overflow-y: auto;
        }

        .prod-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.55rem 0.9rem;
            border-bottom: 1px solid #f3f3f3;
        }
        .prod-item:last-child { border-bottom: none; }
        .prod-item:hover { background: #faf9f7; }

        .prod-info { display: flex; flex-direction: column; gap: 0.05rem; flex: 1; min-width: 0; }
        .prod-nombre { font-weight: 600; font-size: 0.84rem; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-marca  { font-size: 0.71rem; color: var(--muted); }

        .prod-sizes { display: flex; gap: 0.4rem; flex-shrink: 0; }
        .size-add-btn {
            padding: 0.22rem 0.65rem;
            border: 1.5px solid #c8a84b;
            border-radius: 6px;
            background: transparent;
            color: #7a5c0a;
            font-size: 0.72rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background .15s, color .15s;
        }
        .size-add-btn:hover { background: #c8a84b; color: #fff; }

        #productosLista { display: flex; flex-direction: column; gap: 0.4rem; }

        .sel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #faf9f7;
            border: 1px solid #ececec;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            gap: 0.75rem;
        }
        .sel-info  { display: flex; flex-direction: column; gap: 0.1rem; flex: 1; min-width: 0; }
        .sel-nombre { font-weight: 600; font-size: 0.83rem; color: #1a1a1a; }
        .sel-det    { font-size: 0.71rem; color: var(--muted); }

        .sel-controls { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; }
        .qty-btn {
            width: 26px; height: 26px;
            border: 1.5px solid #ddd;
            border-radius: 5px;
            background: #fff;
            cursor: pointer;
            font-size: 0.88rem;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
            transition: border-color .12s;
        }
        .qty-btn:hover { border-color: #aaa; background: #f5f5f5; }
        .qty-num { font-size: 0.83rem; font-weight: 700; min-width: 18px; text-align: center; }
        .del-btn {
            width: 26px; height: 26px;
            border: 1.5px solid #fcc;
            border-radius: 5px;
            background: #fff;
            color: #c00;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
            transition: background .12s;
        }
        .del-btn:hover { background: #fee5e5; }

        .field-input {
            padding: 0.6rem 0.9rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .field-input:focus { border-color: #c8a84b; }
    </style>
</head>
<body>

<div class="admin-page">

    <div class="admin-header" style="display:flex; align-items:center; justify-content:space-between;">
        <h1>Panel de administración</h1>
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <span class="admin-brand">Decants</span>
            <form th:action="@{/aura-gestion/logout}" method="post" style="margin:0;">
                <button type="submit" style="background:none; border:none; color:rgba(255,255,255,0.6); font-size:0.8rem; cursor:pointer; font-family:inherit;">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>

    <div style="margin-bottom:1.5rem;">
        <a th:href="@{/aura-gestion/pedidos}" class="admin-link">&#8592; Volver a pedidos</a>
    </div>

    <div class="admin-card" style="max-width:620px;">
        <div class="admin-card-header">
            <h2>Registrar venta directa</h2>
            <span style="background:#e8e0f8; color:#4a2d8a; font-size:0.72rem; font-weight:700;
                         padding:0.2rem 0.6rem; border-radius:4px;">MANUAL</span>
        </div>

        <form id="ventaForm" th:action="@{/aura-gestion/pedidos/nuevo}" method="post"
              onsubmit="return validarForm()"
              style="padding:1.5rem 1.75rem; display:flex; flex-direction:column; gap:1.1rem;">

            <!-- ── Datos del cliente ── -->
            <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px;
                      color:var(--muted); margin:0 0 -0.4rem 0;">Datos del cliente</p>

            <div style="display:flex; gap:1rem;">
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">Nombre *</label>
                    <input type="text" name="nombre" required placeholder="Ana García" class="field-input">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">
                        Teléfono * <span style="font-weight:400; color:var(--muted);">(10 dígitos)</span>
                    </label>
                    <input type="tel" name="telefono" required placeholder="5512345678" maxlength="10" class="field-input">
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">
                    Email <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                </label>
                <input type="email" name="email" placeholder="ana@ejemplo.com" class="field-input">
            </div>

            <hr style="border:none; border-top:1px solid #ececec; margin:0;">

            <!-- ── Detalle del pedido ── -->
            <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px;
                      color:var(--muted); margin:0 0 -0.4rem 0;">Detalle del pedido</p>

            <!-- Buscador de productos -->
            <div style="display:flex; flex-direction:column; gap:0.4rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">Productos vendidos *</label>

                <div id="productoPicker">
                    <input type="text" id="productoBusqueda"
                           placeholder="Buscar por nombre o marca…"
                           autocomplete="off"
                           oninput="buscarProducto(this.value)"
                           onfocus="buscarProducto(this.value)"
                           class="field-input">
                    <div id="productoDropdown"></div>
                </div>

                <div id="productosLista">
                    <p style="color:var(--muted); font-size:0.8rem; margin:0.25rem 0 0;">Sin productos seleccionados</p>
                </div>

                <input type="hidden" name="productos" id="productosInput">
                <div id="productosError" style="display:none; color:#c00; font-size:0.75rem;">
                    Agrega al menos un producto.
                </div>
            </div>

            <!-- Total + Estado -->
            <div style="display:flex; gap:1rem;">
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">Total cobrado ($MXN) *</label>
                    <input type="number" name="total" required min="1" placeholder="350" class="field-input">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444;">Estado</label>
                    <select name="estado" class="field-input" style="background:#fff; cursor:pointer;">
                        <option value="CREADO">Creado</option>
                        <option value="CONFIRMADO">Confirmado</option>
                        <option value="LISTO_PARA_ENVIO">Listo para envío</option>
                        <option value="ENVIADO">Enviado</option>
                        <option value="ENTREGADO">Entregado</option>
                        <option value="CANCELADO">Cancelado</option>
                    </select>
                </div>
            </div>

            <!-- Dirección (required + Maps Autocomplete) -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">Dirección de entrega *</label>
                <input type="text" id="direccion" name="direccion" required
                       placeholder="Calle, colonia, ciudad…"
                       class="field-input">
                <input type="hidden" name="latitud"  id="latitud">
                <input type="hidden" name="longitud" id="longitud">
            </div>

            <!-- Notas -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444;">
                    Notas / método de pago <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                </label>
                <textarea name="comentarios" rows="2"
                          placeholder="Pago por transferencia, venta por WhatsApp, cliente conocido…"
                          class="field-input" style="resize:vertical;"></textarea>
            </div>

            <!-- Botones -->
            <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
                <button type="submit"
                        style="flex:1; padding:0.75rem 1.5rem; background:#1a1a1a; color:#fff; border:none;
                               border-radius:8px; font-size:0.88rem; font-family:inherit; cursor:pointer; font-weight:600;">
                    Registrar pedido
                </button>
                <a th:href="@{/aura-gestion/pedidos}"
                   style="flex:1; padding:0.75rem 1.5rem; background:#f5f5f5; color:#444; border:none;
                          border-radius:8px; font-size:0.88rem; font-family:inherit; text-align:center;
                          text-decoration:none; display:flex; align-items:center; justify-content:center;
                          font-weight:600;">
                    Cancelar
                </a>
            </div>

        </form>
    </div>

</div>

<!-- Datos de productos desde BD -->
<script th:inline="javascript">
/*<![CDATA[*/
var PRODUCTOS_DB = /*[[${productosJson}]]*/ [];
/*]]>*/
</script>

<script>
var seleccionados = [];

function buscarProducto(q) {
    var dd = document.getElementById('productoDropdown');
    q = q.trim().toLowerCase();
    if (!q) { dd.style.display = 'none'; return; }

    var filtrados = PRODUCTOS_DB.filter(function(p) {
        return p.nombre.toLowerCase().indexOf(q) !== -1 ||
               p.marca.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 8);

    if (!filtrados.length) { dd.style.display = 'none'; return; }

    dd.innerHTML = filtrados.map(function(p) {
        var has5 = p.precio5ml !== null && p.precio5ml !== undefined;
        var btns = '<button type="button" class="size-add-btn" onclick="agregarProducto(' +
            p.id + ',\'10ml\',' + p.precio + ')">10ml · $' + p.precio + '</button>';
        if (has5) {
            btns += '<button type="button" class="size-add-btn" onclick="agregarProducto(' +
                p.id + ',\'5ml\',' + p.precio5ml + ')">5ml · $' + p.precio5ml + '</button>';
        }
        return '<div class="prod-item">' +
            '<div class="prod-info">' +
                '<span class="prod-nombre">' + esc(p.nombre) + '</span>' +
                '<span class="prod-marca">' + esc(p.marca) + '</span>' +
            '</div>' +
            '<div class="prod-sizes">' + btns + '</div>' +
        '</div>';
    }).join('');

    dd.style.display = 'block';
}

function agregarProducto(id, variante, precio) {
    var prod = null;
    for (var i = 0; i < PRODUCTOS_DB.length; i++) {
        if (PRODUCTOS_DB[i].id === id) { prod = PRODUCTOS_DB[i]; break; }
    }
    if (!prod) return;

    for (var j = 0; j < seleccionados.length; j++) {
        if (seleccionados[j].id === id && seleccionados[j].variante === variante) {
            seleccionados[j].cantidad++;
            cerrar();
            render();
            return;
        }
    }
    seleccionados.push({ id: prod.id, nombre: prod.nombre, variante: variante, precio: precio, cantidad: 1 });
    cerrar();
    render();
}

function cerrar() {
    document.getElementById('productoDropdown').style.display = 'none';
    document.getElementById('productoBusqueda').value = '';
}

function cambiarCantidad(idx, delta) {
    seleccionados[idx].cantidad += delta;
    if (seleccionados[idx].cantidad <= 0) seleccionados.splice(idx, 1);
    render();
}

function eliminarProducto(idx) {
    seleccionados.splice(idx, 1);
    render();
}

function render() {
    var c = document.getElementById('productosLista');
    if (!seleccionados.length) {
        c.innerHTML = '<p style="color:var(--muted); font-size:0.8rem; margin:0.25rem 0 0;">Sin productos seleccionados</p>';
        document.getElementById('productosInput').value = '';
        return;
    }
    c.innerHTML = seleccionados.map(function(s, i) {
        return '<div class="sel-item">' +
            '<div class="sel-info">' +
                '<span class="sel-nombre">' + esc(s.nombre) + '</span>' +
                '<span class="sel-det">' + s.variante + ' · $' + s.precio + '</span>' +
            '</div>' +
            '<div class="sel-controls">' +
                '<button type="button" class="qty-btn" onclick="cambiarCantidad(' + i + ',-1)">&#8722;</button>' +
                '<span class="qty-num">' + s.cantidad + '</span>' +
                '<button type="button" class="qty-btn" onclick="cambiarCantidad(' + i + ',1)">+</button>' +
                '<button type="button" class="del-btn" onclick="eliminarProducto(' + i + ')">&#215;</button>' +
            '</div>' +
        '</div>';
    }).join('');

    var texto = seleccionados.map(function(s) {
        var t = s.nombre + ' ' + s.variante;
        if (s.cantidad > 1) t += ' x' + s.cantidad;
        return t;
    }).join(', ');
    document.getElementById('productosInput').value = texto;
    document.getElementById('productosError').style.display = 'none';
}

function validarForm() {
    if (!seleccionados.length) {
        document.getElementById('productosError').style.display = 'block';
        document.getElementById('productoBusqueda').scrollIntoView({ behavior: 'smooth', block: 'center' });
        document.getElementById('productoBusqueda').focus();
        return false;
    }
    return true;
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('click', function(e) {
    if (!document.getElementById('productoPicker').contains(e.target)) {
        document.getElementById('productoDropdown').style.display = 'none';
    }
});
</script>

<!-- Google Maps Places Autocomplete -->
<th:block th:if="${mapsApiKey != null and !#strings.isEmpty(mapsApiKey)}">
    <script>
    function initMaps() {
        var input = document.getElementById('direccion');
        var ac = new google.maps.places.Autocomplete(input, {
            componentRestrictions: { country: 'mx' },
            fields: ['formatted_address', 'geometry']
        });
        ac.addListener('place_changed', function() {
            var place = ac.getPlace();
            if (place.geometry && place.geometry.location) {
                document.getElementById('latitud').value  = place.geometry.location.lat();
                document.getElementById('longitud').value = place.geometry.location.lng();
            }
            if (place.formatted_address) input.value = place.formatted_address;
        });
    }
    </script>
    <script th:src="|https://maps.googleapis.com/maps/api/js?key=${mapsApiKey}&libraries=places&callback=initMaps|"
            async defer></script>
</th:block>

</body>
</html>
