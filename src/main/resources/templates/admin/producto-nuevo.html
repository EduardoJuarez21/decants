<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo producto — Admin | Aura Decants MX</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div class="admin-page">

    <div class="admin-header" style="display:flex; align-items:center; justify-content:space-between;">
        <h1>Panel de administración</h1>
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <span class="admin-brand">Aura Decants</span>
            <form th:action="@{/aura-gestion/logout}" method="post" style="margin:0;">
                <button type="submit" style="background:none; border:none; color:rgba(255,255,255,0.6); font-size:0.8rem; cursor:pointer; font-family:inherit;">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>

    <div style="margin-bottom:1.5rem;">
        <a th:href="@{/aura-gestion/productos}" class="admin-link">&#8592; Volver al catálogo</a>
    </div>

    <div th:if="${error}"
         style="background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; border-radius:8px;
                padding:0.75rem 1.25rem; margin-bottom:1.25rem; font-size:0.88rem;"
         th:text="${error}"></div>

    <div class="admin-card" style="max-width:580px;">
        <div class="admin-card-header">
            <h2>Nuevo producto</h2>
        </div>

        <form th:action="@{/aura-gestion/productos/nuevo}" method="post" enctype="multipart/form-data"
              style="padding:1.5rem 1.75rem; display:flex; flex-direction:column; gap:1.1rem;">

            <!-- Nombre -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Nombre</label>
                <input type="text" name="nombre" required placeholder="ej. Acqua di Gio"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Marca -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Marca</label>
                <input type="text" name="marca" required placeholder="ej. Giorgio Armani"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Categoría y Género -->
            <div style="display:flex; gap:1rem;">
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Categoría</label>
                    <select name="categoria" required
                            style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                   font-size:0.9rem; font-family:inherit; background:#fff; outline:none; width:100%;">
                        <option value="alta-perfumeria">Alta Perfumería</option>
                        <option value="nicho-arabe">Nicho Árabe</option>
                    </select>
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Género</label>
                    <select name="genero" required
                            style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                   font-size:0.9rem; font-family:inherit; background:#fff; outline:none; width:100%;">
                        <option value="hombre">Hombre</option>
                        <option value="mujer">Mujer</option>
                        <option value="unisex">Unisex</option>
                    </select>
                </div>
            </div>

            <!-- Familia -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Familia olfativa <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                </label>
                <input type="text" name="familia" placeholder="ej. Acuática, Amaderada, Oriental"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Notas -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Notas principales <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                </label>
                <input type="text" name="notas" placeholder="ej. Bergamota · Jazmín · Cedro"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Características -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Características <span style="font-weight:400; color:var(--muted);">(opcional, cómo se percibe: dulce, fresco, juvenil…)</span>
                </label>
                <input type="text" name="caracteristicas" placeholder="ej. Dulce · Juvenil · Fresco"
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Precios -->
            <div style="display:flex; gap:1rem;">
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Precio 10 ml ($)</label>
                    <input type="number" name="precio" min="1" required
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                        Precio 5 ml ($) <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                    </label>
                    <input type="number" name="precio5ml" min="1"
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
                <div style="display:flex; flex-direction:column; gap:0.3rem; flex:1;">
                    <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                        Precio 3 ml ($) <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                    </label>
                    <input type="number" name="precio3ml" min="1"
                           style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                                  font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
                </div>
            </div>

            <!-- Orden -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">Orden en catálogo</label>
                <input type="number" name="orden" th:value="${siguienteOrden}" min="1" required
                       style="padding:0.6rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.9rem; font-family:inherit; outline:none; width:100%; box-sizing:border-box;">
            </div>

            <!-- Imagen principal -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Imagen principal
                    <span style="font-weight:400; font-size:0.7rem; color:var(--muted); text-transform:none; letter-spacing:0;">&nbsp;— se convierte a .webp automáticamente</span>
                </label>
                <input type="file" name="imagenPrincipal" accept="image/*" required
                       style="padding:0.5rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.85rem; font-family:inherit; background:#fafafa; width:100%; box-sizing:border-box;">
            </div>

            <!-- Imagen características -->
            <div style="display:flex; flex-direction:column; gap:0.3rem;">
                <label style="font-size:0.75rem; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:0.5px;">
                    Imagen características <span style="font-weight:400; color:var(--muted);">(opcional)</span>
                </label>
                <input type="file" name="imagenCaracteristicas" accept="image/*"
                       style="padding:0.5rem 0.9rem; border:1.5px solid #e0e0e0; border-radius:8px;
                              font-size:0.85rem; font-family:inherit; background:#fafafa; width:100%; box-sizing:border-box;">
            </div>

            <!-- Best Seller -->
            <label style="display:flex; align-items:center; gap:0.6rem; cursor:pointer; font-size:0.88rem; color:#444;">
                <input type="checkbox" name="bestSeller" value="true"
                       style="width:16px; height:16px; cursor:pointer; accent-color:#1a1a1a;">
                Marcar como Best Seller ★
            </label>

            <!-- Botones -->
            <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
                <button type="submit"
                        style="flex:1; padding:0.7rem 1.5rem; background:#1a1a1a; color:#fff; border:none;
                               border-radius:8px; font-size:0.88rem; font-family:inherit; cursor:pointer; font-weight:600;">
                    Crear producto
                </button>
                <a th:href="@{/aura-gestion/productos}"
                   style="flex:1; padding:0.7rem 1.5rem; background:#f5f5f5; color:#444; border:none;
                          border-radius:8px; font-size:0.88rem; font-family:inherit; cursor:pointer; font-weight:600;
                          text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center;">
                    Cancelar
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
